<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f8fbfb" />
  <title>Alaqay — No Connection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
      background:
        radial-gradient(circle at 18% 4%, oklch(0.94 0.09 128 / 0.34), transparent 30rem),
        linear-gradient(145deg, oklch(0.997 0.002 197), oklch(0.967 0.005 210));
    }

    .offline-card {
      display: grid;
      place-items: center;
      text-align: center;
      gap: 1.25rem;
      max-width: 340px;
      padding: 2.5rem 1.75rem;
      border-radius: 34px;
      background: oklch(1 0 0 / 0.84);
      backdrop-filter: blur(22px);
      box-shadow: 0 24px 80px oklch(0.2 0.02 220 / 0.1);
      border: 1px solid oklch(0.2 0.02 220 / 0.06);
    }

    .spark {
      position: relative;
      width: 100px;
      height: 100px;
      display: grid;
      place-items: center;
    }

    .spark-body {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: oklch(0.92 0.16 126);
      box-shadow:
        0 0 0 4px oklch(0.92 0.16 126 / 0.25),
        0 0 0 10px oklch(0.92 0.16 126 / 0.08);
      animation: sparkPulse 2.4s ease-in-out infinite;
    }

    .spark-ring {
      position: absolute;
      border-radius: 999px;
      border: 1.5px solid oklch(0.72 0.16 128 / 0.2);
      animation: ringExpand 2.4s ease-out infinite;
    }

    .spark-ring:nth-child(2) {
      inset: 18%;
      animation-delay: 0.4s;
    }

    .spark-ring:nth-child(3) {
      inset: 32%;
      border-color: oklch(0.72 0.16 128 / 0.1);
      animation-delay: 0.8s;
    }

    @keyframes sparkPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes ringExpand {
      0% { transform: scale(0.8); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: scale(1.1); opacity: 0; }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: oklch(0.17 0.018 224);
      line-height: 1.15;
    }

    p {
      max-width: 280px;
      font-size: 0.92rem;
      line-height: 1.6;
      color: oklch(0.56 0.021 213.5);
    }

    .try-again {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      min-width: 160px;
      min-height: 48px;
      padding: 0 1.5rem;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 800;
      color: oklch(0.28 0.08 132);
      background: oklch(0.91 0.16 128);
      box-shadow: 0 14px 34px oklch(0.64 0.2 132 / 0.18);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .try-again:active {
      transform: scale(0.97);
      box-shadow: 0 6px 20px oklch(0.64 0.2 132 / 0.12);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="spark">
      <div class="spark-ring"></div>
      <div class="spark-ring"></div>
      <div class="spark-body"></div>
    </div>
    <h1>No connection</h1>
    <p>Your Sparks are waiting. Come back when you're online.</p>
    <button class="try-again" type="button" onclick="window.location.reload()">
      Try again
    </button>
  </div>
</body>
</html>
